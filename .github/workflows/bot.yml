name: Intraday Bot Scanner

on:
  schedule:
    - cron: '*/5 * * * *'  # Ejecución cada 5 minutos
  workflow_dispatch:      # Permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # --- NUEVO PASO: GUARDAR DATOS GENERADOS ---
      - name: Guardar Datos y Logs
        if: always() # Se ejecuta aunque el bot falle, para ver los errores
        uses: actions/upload-artifact@v4
        with:
          name: market-data-and-logs
          path: |
            data/
            *.csv
          retention-days: 7 # Se guardan por una semana